services:
  postgres:
    image: postgres:16-alpine
    container_name: nextbuzz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nextbuzz
    ports:
      - "5432:5432"
    volumes:
      - nextbuzz_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nextbuzz"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nextbuzz_pg_data:
